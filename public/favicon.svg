<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .glass { fill: #a7d49b; }
      .frame { fill: none; stroke: #004F2D; stroke-width: 8; stroke-linejoin: round; }
      .tube { fill: none; stroke: #af4319; stroke-width: 8; stroke-linecap: round; }
      .mouthpiece { fill: #004F2D; stroke: #004F2D; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Tube (Rust) -->
  <path class="tube" d="M 82 15 L 82 65 A 15 15 0 0 1 67 80 L 55 80" />
  <!-- Splash Guard at top of tube -->
  <path class="mouthpiece" d="M 77 15 L 87 15" stroke-width="8" />

  <!-- Mask Glass (Lime Green) -->
  <path class="glass" d="M 15 45 C 15 25, 75 25, 75 45 C 75 65, 55 75, 45 65 C 35 75, 15 65, 15 45 Z" />
  
  <!-- Mask Frame (Pine Green) -->
  <path class="frame" d="M 15 45 C 15 25, 75 25, 75 45 C 75 65, 55 75, 45 65 C 35 75, 15 65, 15 45 Z" />

  <!-- Nose Pocket Detail (Pine Green) -->
  <path class="frame" d="M 35 60 C 40 50, 50 50, 55 60" stroke-width="5" />

  <!-- Mouthpiece Connector (Pine Green) -->
  <path class="mouthpiece" d="M 45 80 L 55 80" />
</svg>